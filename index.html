<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portfolio</title>
    <link id="favicon" rel="icon" href="https://via.placeholder.com/32">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>

<body>

    <div id="night-sky"></div>
    <div id="stars-container"></div>
    <div class="sun-container" onclick="toggleDarkMode()">
        <div class="sun-core"></div>
    </div>
    <div id="notify-toast"></div>

    <div class="main-container">
        <div class="tabs" id="tabContainer"></div>
        <div id="contentContainer"></div>
    </div>

    <div id="adminOverlay">
        <div id="authView">
            <h2 style="margin-top:0">🔑 Accès Admin</h2>
            <input type="password" id="adminPassInput" placeholder="Code secret..."
                onkeydown="if(event.key==='Enter') verifyAdmin()">
            <button class="btn btn-save" onclick="verifyAdmin()">Entrer</button>
            <button class="btn" style="background:none; color:#999; margin-top:10px;"
                onclick="closeAdmin()">Fermer</button>
        </div>

        <div id="editView">
            <div class="admin-header">
                <button id="nav-btn-content" class="nav-link active" onclick="switchAdminTab('content')">📂
                    CONTENU</button>
                <button id="nav-btn-settings" class="nav-link" onclick="switchAdminTab('settings')">⚙️ CONFIG</button>
            </div>
            <div class="admin-scroll-area">
                <div id="admin-tab-content">
                    <div id="sectionsList"></div>
                    <button class="btn"
                        style="background:var(--admin-accent); color:white; width:100%; margin-top:10px;"
                        onclick="addNewSection()">+ Ajouter un Onglet</button>
                </div>
                <div id="admin-tab-settings" style="display:none">
                    <div class="item-box">
                        <h3>🎨 Visuel</h3>
                        <label>URL du Favicon :</label>
                        <input type="text" id="faviconInput" oninput="updateFaviconPreview()">
                        <div id="favicon-preview" style="margin-top: 10px; text-align: center;">
                            <img id="favicon-img" src="" style="width: 32px; height: 32px; display: none;"
                                alt="Favicon preview">
                            <p id="favicon-url"
                                style="font-size: 0.9rem; color: #666; word-break: break-all; margin: 5px 0;"></p>
                        </div>
                    </div>
                    <div class="item-box">
                        <h3>🔒 Sécurité</h3>
                        <label>Nouveau code d'accès :</label><input type="text" id="newPassInput"
                            placeholder="Laisser vide pour garder l'actuel">
                    </div>
                </div>
                <button class="btn btn-save" onclick="saveChanges()">🚀 Sauvegarder & Publier</button>
                <button class="btn" style="width:100%; margin-top:10px; background:#eee;"
                    onclick="closeAdmin()">Annuler</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <div id="dark-mode-tip">💡 Astuce : Cliquez sur le soleil en haut à droite pour le mode sombre !</div>
</body>

</html>
